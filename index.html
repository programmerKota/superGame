<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101820" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta
      name="description"
      content="実在する地球を徒歩・車・電車で探索するプライベート3Dオープンワールド。"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
    <title>SuperGame — Real World</title>
  </head>
  <body>
    <main id="game" aria-label="3D地球" aria-busy="true"></main>

    <div id="crosshair" aria-hidden="true"></div>

    <section id="hud" aria-live="polite">
      <div id="coordinates">緯度 -- / 経度 -- / 高度 --</div>
      <div id="speed">徒歩 / 0 km/h</div>
      <div id="route-info" hidden></div>
      <div id="status">世界を初期化しています…</div>
    </section>

    <nav id="mode-switcher" aria-label="移動方法">
      <button type="button" data-mode="walk" aria-pressed="true">
        <span class="mode-key">1</span>
        徒歩
      </button>
      <button type="button" data-mode="car" aria-pressed="false">
        <span class="mode-key">2</span>
        車
      </button>
      <button type="button" data-mode="train" aria-pressed="false">
        <span class="mode-key">3</span>
        電車
      </button>
    </nav>

    <section id="location-panel" aria-label="場所を移動">
      <form id="location-form">
        <input
          id="location-input"
          name="location"
          type="search"
          autocomplete="off"
          placeholder="地名 または 緯度,経度"
          aria-label="地名または座標"
        />
        <button type="submit">移動</button>
      </form>
      <div id="presets">
        <button type="button" data-lat="35.681236" data-lon="139.767125">東京</button>
        <button type="button" data-lat="35.360625" data-lon="138.727363">富士山</button>
        <button type="button" data-lat="40.758000" data-lon="-73.985500">NY</button>
        <button type="button" data-lat="48.858370" data-lon="2.294481">パリ</button>
      </div>
    </section>

    <div id="overlay">
      <section class="panel">
        <p class="eyebrow">SUPERGAME / REAL WORLD</p>
        <h1>現実世界を、歩けるゲームへ。</h1>
        <p>
          実在する地球、地形、建物、線路を読み込み、徒歩・車・電車で任意地点を探索します。
        </p>
        <button id="start-button" class="primary" type="button">世界に入る</button>
        <div class="controls">
          <span>WASD：移動・加減速</span>
          <span>Shift：走る・高速走行</span>
          <span>Space：ジャンプ・制動</span>
          <span>マウス：視点</span>
          <span>1 / 2 / 3：移動方法</span>
          <span>Esc：操作解除</span>
        </div>
        <p id="data-note" class="data-note">
          Cesium ionトークン未設定時も起動しますが、実在地形と3D建物は簡易表示になります。
        </p>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
